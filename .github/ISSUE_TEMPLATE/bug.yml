name: Bug
description: Something isn't working
labels: ["type: bug"]
body:
  - type: markdown
    attributes:
      value: |
        Check `/docs/pitfalls/README.md` first — the answer may already be there.
  - type: textarea
    id: symptom
    attributes:
      label: Symptom
      description: What did you observe?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should happen instead?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      value: |
        1.
        2.
        3.
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context
      description: Browser, OS, relevant component or route
